body:
  text: 敘南宗之盛赫赫古今其中賢聖間氣而生者不一其地不一其人自分派以後高建法幢設施迥別從上追溯各出英靈漢不少也逮後密雲祖翁中興臨濟一宗大振奔走四方袖子霞蒸川湧往往出而為人者堪作人天眼目如十日並明普天無遁照也州之古塘香林寺先年佛古老和尚手自誅茅創成叢席適遇石公大師機下相契遂成水乳之合入室印可師乃閩籍性聰穎少即出塵其根性猛利洵為宿德再來余於往歲請石公繼席香林閲十餘年撑持門庭飲冰茹櫱甘之如飴其嚴凝之氣凜不可犯故能行人之不能行忍人之不能忍今開堂説法煆煉禪侶針下見血不輕放過獨展太白家風痛棒之下能翻身者當識婆心之太切也其機緣問答録久盈笥將付剞劂流通於世當為法門之模楷後學之金鑑豫莊沐展讀掃盡前人窠臼字字本性流出昔始祖不立文字兮明金針示人不爭於筆鋒墨瀋之間今此之矢口而出者言乃希聲句皆見諦仍與少室面壁玄旨無二無別慨茲法末之秋中流砥柱全賴石公一肩以荷之云不揣而為之序時大清康熙二十二年歲次癸亥仲春之吉旦前奉敕整飭關南道陝西按察使司副使婁江法弟錢廣居薰沐拜撰香林石璞和尚語録序昔大雄氏恆河説法接引人天而獨於最上一乘不立文字滅度以後中五百歲而摩騰竺法蘭以經入中國華人始聞其言後五百歲而菩提達磨以法入中國華人始傳其心此禪與教所由分也慧可大師親受達磨真印燈燈相續遂及南嶽清源嗣後判為臨濟等五宗各依源流並有著述要皆匯三藏而啓覺門非若後世瞎究盲參僅拾先哲一二唾餘謂面壁以來直指明心見性之義舉盡於此也願臨濟一宗傑出溈仰諸宗之上密祖又以利根篤行蔚然中興大轉法輪聚一時僧象人龍咸歸陶鑄即今剎竿林立洵能摻金篦而灑甘露者必推臨濟後人吾婁古塘禪院自佛古老和尚披榛創建拮據捋茶遂成香林叢席閩中石公禪師以夙生法器遍參諸方尊宿了徹大事因緣浮杯來斯在佛老人位下機鋒乍交即示拈華之契適佛老順世石公應州人請嗣主法席十餘年來擔承大事煆煉學人慧劍慈航皆非時賢所能辦白椎之下所記問答積久成編將壽之棗梨埤益論藏屬余數語辨之簡瑞余幼從先君子獲見四方大善知識頗知皈嚮禪宗然久羈塵鞅未窺幽鍵石公深造所至何足以知之特以支許過從見其操履精純鉗錘迅疾聊述其大略如此若夫指之與月是一是二息心了義之士讀香林語録者能自得之也康熙癸亥清和上浣賜進士第左春坊左贊善兼翰林院檢討前翰林院編修加一級乙卯山東正主考欽點內弘文院庶吉士法弟王掞拜題
