body:
  text: 嗣法門人成隱等編住嘉興平湖縣曹溪禪院師於康熙辛酉年正月二十有八日在婁東香林禪寺受當湖闔邑縉紳文學檀越護法暨闔山昆季敦請繼席至二月初十日進院指山門云潑天向上路何須重打開祥麟與瑞鳳盡向此中來佛殿瞿曇是何人六年草裏坐撞著冤家來放過即不可遂拜伽藍據虎頭收虎尾權衡叢林扶揚宗旨舉香云全憑者箇較些子祖師西天東土遁迹無門説黃道白帶纍兒孫插香云不如都坐斷何處不稱尊據室昔年先師老漢在者裏陶鑄銅頭鐵額收下威鳳祥麟今日質上座到來總不與麼驀拈拄杖擲下云直得雲門鼻直德山眼橫一切尋常不須按過何故目前無怪異不必貼鍾馗當日衆護法設齋請上堂師至座前拈檀越疏云先師二十年前有未了底公案今日且向尼山筆尖上增輝佛日普扇真風去也若還未薦有煩對衆宣白法座高登獅子座不禮須彌王舉頭天外看何處不風光便升拈香云者瓣香乾坤以此覆載日月以此照臨爇向寶爐端為祝延今上皇帝聖壽萬安恭願堯風永扇于萬年舜日長明于億劫者瓣香賢聖不傳古今無價奉為滿朝勳貴郡邑尊官檀越紳襟同門昆季伏願長作嚴廊柱礎永為法海津梁者瓣香從無密授豈敢囊藏記得昔年在我岱山得戒學和尚處得旨自謂巍巍堂堂灑灑落落無端又行腳十年撞著箇無面目漢向命脈上一劄直至如今無處雪屈今日對衆拈出端為供養前住香林後住即此堂上開山第一代先師佛古聞老和尚用酬法乳之恩遂攝衣敷座上首白椎云法筵龍象衆當觀第一義師云曹溪波浪如相似無限平人被陸沉還有不涉渺瀰不被陸沉底衲僧麼出來相見僧問重興法席耀古騰今祖令全提意旨如何師便打進云畢竟如何是和尚徹底為人處師云不知痛癢漢進云恁麼則曹溪一滴源頭水流出滹沱萬派宗師云也須識取源頭始得問十載垂綸婁水上重飛法雨潤曹溪四衆殷勤請師直指師打云一棒一條痕一掌一握血進云爐鞴弘開烹凡鑄聖忽若格外人來又作麼生接待師云無伊棲泊處進云輕輕躡足龍門過惹得風雷遍九垓師云不易道將來問獅王哮吼即不問如何是賓中主師云七尺烏藤隨手舉進云如何是主中賓師云垂鉤直欲取金鱗進云如何是賓中賓師云拋卻故園無數春進云如何是主中主師云眼底從來無佛祖進云只如今日在筵勳貴恭迎和尚重振祖山未審還有佛法也無師打云你那裏瞌睡來趙居士問古剎重興子承父業拈槌豎拂地轉天回為復是錦上鋪花為復是單提直指師云截斷兩頭別致一問來進云可謂龍生龍子鳳生鳳兒師云我與你有甚冤讎進云爭奈行人路上口似碑師云切忌喚鐘作甕乃云千差坐斷正眼豁開卷舒立方外乾坤縱橫挂域中日月現大人境界振古佛家風洞明少室真機揭示滹沱正脈掀翻窠臼截斷葛藤洛書兆五福之休虹瑞錫萬邦之慶赤灑灑淨裸裸似鏡臨臺物來斯照所以道我本無心有所希求今此法王大寶自然而至直得如獅子筋琴一奏則衆絃絶響又如塗毒鼓一擊則聞者喪身到者裏縱也在我奪也在我鐵額銅頭也須按過然雖如是且道繼席開堂風行草偃一句又作麼生水歸大海波濤靜雲到蒼梧氣象間復舉大慧禪師以竹篦示衆云喚作竹篦則觸不喚作竹篦則背不得向舉起處承當不得向意根下卜度速道速道師云妙喜老人被者竹篦帶纍未免手腳俱露新曹溪今日也不舉竹篦亦不分背觸頭頭合轍處處歸源總無許多絡索何故家家門前赫日月太平不用將軍威復白椎云諦觀法王法法王法如是師卓拄杖下座當晚小參欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處會取古人恁麼説話大似坐佛床斫佛腳不敬東家孔夫子卻向他鄉習禮樂還有人檢點得出麼豎拂子云自從春色來嵩少三十六峰青至今結夏啓華嚴期請升座開得口來早話墮眨上眉毛已蹉過堪笑善財不唧溜踏翻華藏為甚麼諸兄弟若要本分相應直須從前放下百不知百不會向薰風自南來殿閣生微涼處著一隻眼忽若拶破虛空心華發現自然入林不動草入水不動波左右逢源縱橫得妙雖然只如柏巖開粥度夏仰山種粟燒畬又是明甚麼邊事喝一喝云只知開口易不覺舌頭長下座示衆春風淡柳眉春禽弄百舌一片祖師心處處俱漏泄若從者裏會去早是相埋沒了也更欲向世界未成時父母未生時佛未出世時祖師未西來時道取一言半句未免左之右之驀拈拄杖卓一卓云還會麼更若凝眸不勞相見示衆執之失度必入邪路放之自然體無去住祖師恁麼道也是玉石不分金沙混雜若據衲僧門下天地懸隔且衲僧門下有甚長處靈苗瑞草和根拔滿地從教荊棘生華嚴期圓滿升座釋迦掩室於摩竭淨名杜口于毗耶須菩提唱無説而顯道釋梵絶視聽而雨花雖然如是總不若華藏海裏徹底掀翻千波競涌是文殊境界一亙晴空是普賢床榻男子身中入定時女子身中從定出無一處不是香水海無一塵不是解脫門直得牢籠不肯住呼喚不回頭古聖絶安排至今無處所乃豎起拄杖云者箇是曹溪拄杖子阿那箇是華藏世界卓一卓云百雜碎了也喝一喝下座示衆諸方鉤又曲餌又香奔聚猶如蜂抱土曹溪又不然原無香餌亦無鉤應用隨機任去留幸有寒山與拾得笑空天地不知休佛成道日圓戒升座奇哉十方佛元是眼中花欲識眼中花元是十方佛欲識十方佛不是眼中花欲識眼中花不是十方佛於此明得過在十方佛於此未明聲聞起舞獨覺臨粧琅琊覺尊宿與麼説話大似擊水魚頭痛穿林宿鳥驚爭似我黃面瞿曇大方獨步收放自由有時覷破滿天星有時露出千華戒不留朕迹赤條條合水和泥酬宿債豎拂召大衆云且道釋迦老子宿債還清也未喝一喝云三生六十劫示衆金輪天子敕草店家風別深秋簾幕雨千家落日樓臺風一笛拈起則壁立千仞佛祖潛蹤放下則七縱八橫聖凡同轍且道拈起好放下好五湖煙景有誰爭自是不歸歸便得佛誕圓戒升座今朝正是四月八九龍吐水浴悉達堪笑雲門欲打伊反教千古阿剌剌遂拈拄杖卓一下云釋迦老子來也敢問大衆九十七種大人相莊嚴微妙淨法身且道從那一相浴起若向這裏浴去早已圓成戒法其或未然下座燒香重為説破頌古世尊於臘月八日明星出時廓然大悟乃歎云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得覷著星時禍自招胡言漢語逞家饒縱能瞎卻他人眼自己飢瘡不可療世尊因自恣日文殊三處度夏迦葉欲白椎擯出才拈椎乃見百千萬億文殊迦葉盡其神力椎不能舉世尊遂問迦葉汝擬擯那箇文殊迦葉無對吹毛劍利逆水波清丈夫志氣不順人情君征塞北我伐西秦好手手中呈好手紅心心裏中紅心城東老母與佛同生而不欲見佛每見佛來即便回避雖然如此回顧東西總皆是佛遂以手掩面於十指掌中亦總是佛盡云婆有丈夫作細看廉纖笑殺人爭似東村王大姐風前一曲唱彌新世尊因調達謗佛生身入地獄遂令阿難傳問你在地獄中安否達云我雖在地獄如三禪天樂佛又令阿難傳問你還求出否達云我待世尊來便出阿難云佛是三界大師豈有入地獄分達云佛既無入地獄分我豈有出地獄分鵠白烏本玄松直棘自曲何必窮廝煎弄巧反成拙世尊因有異學問諸法是常耶世尊不對又問諸法是無常耶世尊亦不對異學云世尊具一切智何不對我世尊云汝之所問皆為戲論前不對兮後不對劈面來兮機如電三級浪高魚化龍井底蝦蟆那得見月氏國王聞罽賓國有一尊者名祇夜多有大名稱即與群臣往造彼國禮見問法王既至修敬已畢乃請尊者當為開演尊者云大王來時好道今去亦如來時本入罽賓國不覺到天台雖承尊者力怎奈涉去來利益菩薩白燃燈佛我欲得阿耨菩提唯願世尊教我令速成菩提佛言利益汝見是法何者是法是汝所問碧潭明月本孤圓撈摝再三亦枉然縱有渠儂為指注春光不在柳梢邊陸亙大夫問南泉大悲菩薩用許多手眼作甚麼泉云如國家用大夫作什麼騎賊馬兮搶賊旗手眼拶來明杲杲將謂平步入雲霄誰知猶在含元道老南泉太草草若是鳳凰兒不向那邊討魯祖尋常見僧來便面壁南泉聞乃云我尋常向師僧道佛未出世時會取尚不得一箇半箇他漝地驢年去鮑老當年笑郭郎人前舞袖太郎當及乎鮑老出來舞依舊郎當勝郭郎睦州因新到參方禮拜州叱云闍黎何得偷常住果子吃僧云學人才到和尚為甚麼道偷常住果子吃州云贓物現在腳跟未動已偷了覿面捉他總不親直下欲明端的意睦州早已露賊身靈雲見桃花悟道有偈云三十年來尋劍客幾回落葉又抽枝自從一見桃花後直至如今更不疑玄沙云諦當甚諦當敢保老兄未徹在潦倒靈雲眼豁開玄沙驀地語如雷雖然贏得嘉聲在未免渠儂自活埋鏡清問雪峰古人有言峰便倒臥良久起云問甚麼清再問峰云虛生浪死漢問處成雙橛臥來落二三堪嗟象骨老無處著羞慚保福因僧問雪峰平生有何言句得似羚羊挂角時福云我不可作雪峰弟子不得道泰時清才子貴家肥國富小兒嬌掃除狐兔家風峻甜似蜜兮毒似梟玄沙因僧問如何是學人自己沙云用自己作麼雲門云沒量大人被語脈裏轉卻僧問如何是學人自己門云忽然路上有人喚衲僧齋你也隨分得飯吃玄沙韶老弄假像真峰巒競秀紅紫爭春撒沙撒土無窮極要撥者僧猶隔津襄州龐蘊居士因賣竹漉籬下橋喫撲女子靈照一見亦去爺邊倒士云你作甚麼女云見爺倒地某甲相扶士云賴是無人見爺未倒時偏詐扶爺真倒處佯不理非關女子忤逆多也是爺爺自招底自招底生冤死結何時已夾山常遣一小師遍遊禪剎殊無趣向及聞山道譽遠播乃回省覲云和尚有如許奇特事何不早向某甲道山云汝蒸飯時吾為著火汝行益時吾為展鉢甚處是辜負汝處小師因而悟入聞風回省覲省覲事堪悲早知燈是火飯熟已多時佛事挂鐘版只此輪鎚也不是活捉獰龍也不是生擒猛虎也不是號令人天也不是權衡佛祖畢竟如何擊一擊云直下分明齊聽取送開山佛老和尚牌位入祖堂大機大用震乾坤正眼圓明帝者尊宗旨法幢隨處立更無蹤迹與人論正恁麼時真燈續焰少室增輝坐斷千差端居正位一句又作麼生全體堂堂秖者是從教千聖覓無門佛古老和尚忌日掃塔剷開荊棘獨踞婁江打鳳羅龍移星換斗眼光爍破四天下腳底卷舒六合雲正當恁麼時雖有巴陵三轉語楊岐女人拜到我先師老人面前總用不著畢竟如何香爇一爐茶傾三奠有耳者聞有眼者見一塔長懸太白燈半層雄壓千峰面機緣居士問儒家從讀書門證入聖賢地位只如宗門從何處得入師云從來無門入箇什麼士無語師云切莫向無門處著倒僧問古人道離心意識參既是離心意識參箇甚麼師云上座喚甚麼作心意識僧喝師打云正好參取僧參師問那裏來曰天台來師云石梁橋向你道什麼僧擬議師便打僧喝師云此是喝石橋喝自己喝山僧僧禮拜師云向者裏道得我即拜你僧無語師云你不是天台來僧問虛空有體須親證意旨如何師云有時因好月不覺到滄洲僧云某甲因甚不證虛空師掌云無你棲泊處僧參師問昔日雪竇與數僧遊山次見牯牛舉頭便問牯牛舉頭作麼你試答一語看僧云水足草足師打云卻是東觸西觸僧無語師復打云食到口邊被人奪卻僧問如何是徑截法門師打云一棒一條痕云如何保任師又打云喚作一棒入地獄如箭射僧問和尚在佛老人處得何法師展兩手云會麼僧云謝師答話師掌云討甚熱碗僧參師云相見了也僧擬開口師震聲一喝僧問如何是祖師西來意師云甜瓜徹蒂甜苦瓠連根苦云某甲逢人但恁麼舉師云我向你道甚麼僧擬議師便打士問如何是香林的旨師云呵佛罵祖士喝師便打贊初祖達磨牙齒當門被人打落西來特地亦無所長赤縣衲僧瞞不得剛將無聖誑梁王天童林野老和上鳳翥龍騰十二人師惟後出別垂綸通玄道望馳湖海太白風規播剎塵開山佛古聞和上藞苴川僧全無巴鼻承嗣天童終成造次爭似法幢生面開神清貌古動天地受業念宗實和上泛木蘭舟養摩天鵠行實道尊花開果熟東坡半壑自高間彌嶺千層誰接足咄自贊喜脫彌山犁又拖香林耙通身是水泥十年猶未卸撞著楊岐三腳驢便作溈山水牯跨沒來由怕不怕踏破雲巒任倒耕何妨孫子遍天下蕩盡家私別無奇異補壁折籬摩雲插翅棒下露全機胸中沒隻字愛栽臘月蓮花懶為佛祖苗裔無端輥入曹源中玉浪銀波潑天地曹溪隱監寺請詩偈重陽前三日喜異公王先生過訪深知少出子雲廬此日登臨菊正舒掃徑葉飛驚野鳥呼童茶熟候高車龍山路近間裁賦鳳闕天遙懶上書直是陶公重結社得君佳句勝瓊琚曹溪雨中除夕榻寄臨溪鎖暮煙梅花開盡嶺南天名山到此三千許白髮于今一半先寒向珠林辭舊臘春回蓮漏接新年雨燈兀坐無窮意細聽松濤獨不眠秋夜泊三河黃昏依古岸漁火照沙洲秋滿千山白灘銜亂石流推篷光入枕繫樹影移舟不識誰家子清歌水上樓由黃龍宿金竹坪直入重雲裏方知有草堂遊禽凌碧漢小艇射滄浪竹引前溪水山高八月霜老僧忘節序惟看野花香秋日登湖亭俯仰江湖一鏡天波涵萬象碧無煙匡廬影挂飛帆上載得秋風月正圓虹橋晚眺夕陽倒影漾流霞多少行人未到家江岸漁翁間把釣夜深和月臥蘆花珠江懷素思佘先生閲歷來東嶺思君未易逢雲林間客興湖海淡幽蹤坐對千山月懷深半榻鐘他年歸故國長嘯復相從潮陽度夏懷素園陳居士客路將千里違君一月前北鴻何處見南菊幾時旋帆挂蠻江月杯浮鱷渚煙還山頭帶雪竹裏復談玄宿憨大師塔院一龕古佛明燈千載憨師面目獨坐獅子峰頭驚散飛禽野鹿秋來丹桂飄香臘至巖梅帶雪不知此況誰同惟有老僧藏拙寄懷石室月川和上知兄開法古蓮山不得追隨恨未刪怪石幽篁無恙否蒼蒼應待翠微間送味山龍梅和上還新安葬親不向吳山度歲華為參佛母老摩耶菩提漫道元無樹優鉢看來尚有花錢大可觀察護念諸山惟余為甚偈以謝之名士風流易出塵選官選佛頭頭親雖然三達尊江漢香海相攜只一人贈獅林俍菴和上故人同里復同流煨芋風清古秀州不似化山弘覺祖眼光徒欲爍龍樓贈雲關印公西堂片雲把住元非妄一印高懸示本真何似兩頭都坐斷海天誰識關中人同里瑞宇陳君偕弟振南興宇二居士深慕古道偈以贈之兄弟同居似古人胸中瀟灑亦無塵憐豫法社清如洗長贈荷衣意自真贈潮音以公法姪以謙自牧越常儔點滴潮音萬派流雪竇風光千古在垂機何必整鰲鉤贈嶽生程居士古人學道如鑽火立現金星未肯休果是楊岐真正脈倒扶法社始風流與幻豫書記明明一字兩頭垂塗抹全彰未見奇好把筆尖輕倒卓銅睛鐵眼莫能窺與雪菴金居士法名明錩瞿曇元是古醫王懶向人前説妙方卻被飲光輕漏泄普天匝地絶囊藏與雪堂程居士法名明鑑木樨香悟黃山谷千古應思老晦堂無隱真機明歷歷縱橫何處不芬芳示即中維那不愛諸方五味禪卻餐婁水冷風煙虛空背上行須穩莫倚中間與半邊示圓仁書記仁義悉從貧處斷子能落落此中圓應知故國雪峰老半句鄉音道不全贈穆生黃居士生平磊落自清真得句高吟懶説貧長笑陶公門外漢攢眉甘作醉中人贈鵡湖法姪復園王居士君是鳳凰山上人不知摩詰亦前身喜吟雅句驚江漢莫負西來少室春
